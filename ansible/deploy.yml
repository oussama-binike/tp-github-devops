---
- name: Déploiement Shopping Cart avec Ansible
  hosts: webservers
  become: no
  connection: ssh

  vars:
    app_name: shopping-cart
    app_port: 8070

  tasks:
    - name: Afficher le début du déploiement
      debug:
        msg: "Déploiement de {{ app_name }} sur {{ inventory_hostname }}"

    - name: Installer Java
      raw: apk add --no-cache openjdk11-jre

    - name: Créer le dossier app
      raw: mkdir -p /opt/{{ app_name }}

    - name: Arrêter l'ancienne instance
      raw: pkill -f {{ app_name }} || true

    - name: Vérifier Java
      raw: java -version

    - name: Afficher le résultat
      debug:
        msg: "Application déployée avec succès sur {{ inventory_hostname }} !"
